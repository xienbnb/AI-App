<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI写作APP - v5.2 封面增强版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#EEF2FF', 100: '#E0E7FF', 200: '#C7D2FE', 300: '#A5B4FC',
                            400: '#818CF8', 500: '#6366F1', 600: '#4F46E5', 700: '#4338CA',
                        },
                        ai: {
                            50: '#F5F3FF', 400: '#A78BFA', 500: '#8B5CF6', 600: '#7C3AED',
                        },
                        success: { 500: '#10B981', 600: '#059669' },
                        warning: { 500: '#F59E0B' },
                        danger: { 500: '#EF4444' },
                    }
                }
            }
        }
    </script>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            box-sizing: border-box;
        }
        input, textarea { user-select: text; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #E0E7FF 0%, #F3E8FF 50%, #ECFDF5 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .dark body { background: linear-gradient(135deg, #1E1B4B 0%, #312E81 50%, #064E3B 100%); }
        
        .phone-frame {
            width: 375px;
            height: 812px;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 
                0 0 0 12px #1a1a2e,
                0 0 0 14px #2a2a4e,
                0 50px 100px -20px rgba(0,0,0,0.3),
                0 30px 60px -30px rgba(99,102,241,0.3);
            position: relative;
            background: #F9FAFB;
            margin: 0 auto;
        }
        .dark .phone-frame { background: #0F172A; }
        
        /* 灵动岛 */
        .dynamic-island {
            position: absolute;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 37px;
            background: #000;
            border-radius: 20px;
            z-index: 100;
        }
        
        /* 底部安全区指示器 */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 134px;
            height: 5px;
            background: #CBD5E1;
            border-radius: 100px;
            z-index: 100;
        }
        .dark .home-indicator { background: #475569; }
        
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .card-press { transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card-press:active { transform: scale(0.97); opacity: 0.9; }
        
        .btn-press { transition: all 0.15s cubic-bezier(0.2, 0, 0.2, 1); }
        .btn-press:active { transform: scale(0.95); }
        
        .grad-text {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes pageEnter {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastIn {
            0% { opacity: 0; transform: translateY(-15px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        .animate-page-enter { animation: pageEnter 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .animate-toast-in { animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-pulse-ring { animation: pulse-ring 1.5s infinite; }
        
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-content {
            width: 100%;
            max-height: 85%;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            animation: slideUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow-y: auto;
        }
        .dark .modal-content { background: #1E293B; }
        
        .cover-option.selected {
            box-shadow: 0 0 0 3px #6366F1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="flex flex-col items-center gap-6">
    <!-- 版本信息 -->
    <div class="text-center">
        <h1 class="text-3xl font-bold grad-text mb-2">📱 AI写作APP</h1>
        <p class="text-gray-500 text-sm">v5.2 封面增强版 · 新增书籍封面选择 · 直接打开即可运行</p>
    </div>
    
    <!-- 手机框架 -->
    <div class="phone-frame" id="phoneFrame">
        <!-- 灵动岛 -->
        <div class="dynamic-island"></div>
        
        <!-- 状态栏 -->
        <div class="h-[54px] flex items-end justify-between px-8 pb-2 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm relative z-50">
            <span class="text-sm font-semibold text-gray-800 dark:text-white" id="statusTime">9:41</span>
            <div class="flex items-center gap-1.5 text-gray-800 dark:text-white">
                <span class="text-xs">📶</span>
                <span class="text-xs">🔋</span>
            </div>
        </div>
        
        <!-- 顶部导航栏 -->
        <div id="navBar" class="h-14 flex items-center px-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-sm border-b border-gray-100/50 dark:border-gray-800/50 relative z-40">
            <button id="navBack" onclick="goBack()" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors hidden">
                ‹
            </button>
            <span id="navTitle" class="font-bold text-gray-800 dark:text-white text-lg ml-2 flex-1"></span>
            <div id="navActions"></div>
        </div>
        
        <!-- 页面容器 -->
        <div id="pageContainer" class="h-[calc(100%-54px-56px-83px)] scroll-hide overflow-y-auto relative z-10">
            <!-- 页面内容由JS动态渲染 -->
        </div>
        
        <!-- 编辑器工具栏 -->
        <div id="editorToolbar" class="hidden absolute bottom-[83px] left-0 right-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 px-3 py-2 z-40">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-1">
                    <button onclick="editorAction('undo')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="撤销">
                        ↩
                    </button>
                    <button onclick="editorAction('bold')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors font-bold" title="粗体">
                        B
                    </button>
                    <button onclick="editorAction('heading')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="标题">
                        H
                    </button>
                    <button onclick="editorAction('italic')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors italic" title="斜体">
                        I
                    </button>
                </div>
                <button onclick="openAIPanel()" class="px-4 h-9 rounded-xl flex items-center gap-1.5 bg-gradient-to-r from-primary-500 to-ai-500 text-white shadow-lg shadow-primary-500/30 btn-press">
                    <span>✨</span>
                    <span class="text-xs font-semibold">AI写作</span>
                </button>
                <div class="flex items-center gap-1">
                    <button onclick="editorAction('list')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="列表">
                        ☰
                    </button>
                    <button onclick="editorAction('quote')" class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="引用">
                        ❝
                    </button>
                    <button onclick="saveChapter()" class="w-9 h-9 rounded-full flex items-center justify-center text-green-500 hover:bg-green-50 dark:hover:bg-green-900/30 transition-colors" title="保存">
                        ✓
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div id="tabBar" class="absolute bottom-0 left-0 right-0 h-[83px] bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 flex items-center justify-around px-1 pb-8 z-50">
            <button onclick="switchTab('home')" data-tab="home" class="tab-btn relative flex flex-col items-center gap-0.5 px-4 py-2 transition-all duration-300 text-primary-500 scale-105">
                <span class="text-xl">🏠</span>
                <span class="text-[11px] font-medium">首页</span>
            </button>
            <button onclick="switchTab('works')" data-tab="works" class="tab-btn relative flex flex-col items-center gap-0.5 px-4 py-2 transition-all duration-300 text-gray-400">
                <span class="text-xl">📚</span>
                <span class="text-[11px]">作品</span>
            </button>
            <button onclick="switchTab('community')" data-tab="community" class="tab-btn relative flex flex-col items-center gap-0.5 px-4 py-2 transition-all duration-300 text-gray-400">
                <span class="text-xl">👥</span>
                <span class="text-[11px]">社区</span>
                <span class="absolute top-0 right-1 w-2 h-2 bg-red-500 rounded-full border border-white dark:border-slate-900"></span>
            </button>
            <button onclick="switchTab('ai')" data-tab="ai" class="tab-btn relative flex flex-col items-center gap-0.5 px-4 py-2 transition-all duration-300 text-gray-400">
                <span class="text-xl">🤖</span>
                <span class="text-[11px]">AI工坊</span>
            </button>
            <button onclick="switchTab('me')" data-tab="me" class="tab-btn relative flex flex-col items-center gap-0.5 px-4 py-2 transition-all duration-300 text-gray-400">
                <span class="text-xl">👤</span>
                <span class="text-[11px]">我的</span>
            </button>
        </div>
        
        <!-- 底部安全区指示器 -->
        <div class="home-indicator"></div>
        
        <!-- Toast容器 -->
        <div id="toastContainer" class="absolute top-[70px] left-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none"></div>
        
        <!-- 模态框容器 -->
        <div id="modalContainer" class="hidden"></div>
    </div>
    
    <!-- 功能说明卡片 -->
    <div class="grid grid-cols-2 md:grid-cols-6 gap-3 w-full max-w-2xl">
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">➕</div>
            <div class="font-semibold text-gray-800 text-sm">创建新书</div>
            <div class="text-xs text-gray-400">首页快捷入口</div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">🎨</div>
            <div class="font-semibold text-gray-800 text-sm">封面选择</div>
            <div class="text-xs text-gray-400">12款精美封面</div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">📖</div>
            <div class="font-semibold text-gray-800 text-sm">章节管理</div>
            <div class="text-xs text-gray-400">新建/编辑/删除</div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">✏️</div>
            <div class="font-semibold text-gray-800 text-sm">富文本编辑</div>
            <div class="text-xs text-gray-400">加粗/斜体/引用</div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">💾</div>
            <div class="font-semibold text-gray-800 text-sm">自动保存</div>
            <div class="text-xs text-gray-400">实时字数统计</div>
        </div>
        <div class="bg-white/70 backdrop-blur-sm rounded-2xl p-4 text-center shadow-sm">
            <div class="text-2xl mb-1">🤖</div>
            <div class="font-semibold text-gray-800 text-sm">AI辅助</div>
            <div class="text-xs text-gray-400">续写/润色/灵感</div>
        </div>
    </div>
</div>

<script>
// ==================== 全局状态管理 ====================
const AppState = {
    currentPage: 'home',
    pageStack: [],
    darkMode: false,
    guardianEnabled: true,
    
    // 书籍数据
    books: [
        {
            id: 1,
            title: '超神：我以DNF镇诸神',
            category: '玄幻',
            status: 'writing', // writing | completed | paused
            cover: 'from-purple-500 to-blue-500',
            description: '谢峰，一个普通的996社畜，意外穿越到超神学院的世界，获得了阿拉德系统...',
            createdAt: '2026-05-01',
            wordCount: 128000,
            chapters: [
                { id: 101, title: '第一章 穿越', wordCount: 2100, createdAt: '2026-05-01', content: '谢峰站在巨峡市的街头，看着天空中突然出现的虫洞，眼神变得凝重。这一天，终于还是来了...' },
                { id: 102, title: '第二章 阿拉德系统', wordCount: 2050, createdAt: '2026-05-02', content: '【叮！检测到宿主穿越成功，阿拉德系统正在激活...】' },
                { id: 103, title: '第三章 初次试炼', wordCount: 1980, createdAt: '2026-05-03', content: '系统提示音落下，谢峰的眼前出现了一个虚拟面板。' },
            ]
        },
        {
            id: 2,
            title: '凡人修仙传同人',
            category: '仙侠',
            status: 'writing',
            cover: 'from-green-500 to-teal-500',
            description: '一个普通山村少年的修仙之路...',
            createdAt: '2026-05-10',
            wordCount: 85000,
            chapters: [
                { id: 201, title: '第一章 山村少年', wordCount: 2200, createdAt: '2026-05-10', content: '青牛镇，一个位于越国边境的普通小镇。' },
            ]
        }
    ],
    
    // 当前编辑状态
    currentBookId: null,
    currentChapterId: null,
    editorContent: '',
    editorChapterTitle: '',
    newBookCover: 'from-purple-500 to-blue-500', // 默认封面
    
    // 模态框状态
    modalType: null, // 'newBook' | 'newChapter' | 'aiPanel' | null
};

// ==================== 封面模板 ====================
const COVER_TEMPLATES = [
    { id: 'from-purple-500 to-blue-500', name: '紫蓝渐变', icon: '⚔️' },
    { id: 'from-green-500 to-teal-500', name: '青绿渐变', icon: '🏔️' },
    { id: 'from-rose-500 to-pink-500', name: '玫粉渐变', icon: '💖' },
    { id: 'from-amber-500 to-orange-500', name: '金黄渐变', icon: '🏙️' },
    { id: 'from-cyan-500 to-sky-500', name: '天蓝渐变', icon: '🚀' },
    { id: 'from-red-500 to-rose-500', name: '绯红渐变', icon: '🔱' },
    { id: 'from-indigo-500 to-purple-500', name: '靛紫渐变', icon: '🌙' },
    { id: 'from-emerald-500 to-green-500', name: '翡翠渐变', icon: '🌿' },
    { id: 'from-fuchsia-500 to-pink-500', name: '樱花渐变', icon: '🌸' },
    { id: 'from-violet-500 to-indigo-500', name: '堇紫渐变', icon: '✨' },
    { id: 'from-slate-700 to-slate-900', name: '暗黑渐变', icon: '🌑' },
    { id: 'from-sky-400 to-blue-600', name: '深海渐变', icon: '🌊' },
];

// ==================== 工具函数 ====================
function getGreeting() {
    const hour = new Date().getHours();
    if (hour < 12) return '早上好，';
    if (hour < 18) return '下午好，';
    return '晚上好，';
}

function formatWordCount(count) {
    if (count >= 10000) return (count / 10000).toFixed(1) + '万';
    if (count >= 1000) return (count / 1000).toFixed(1) + 'k';
    return count.toString();
}

function getCategoryIcon(category) {
    const icons = { '玄幻': '⚔️', '仙侠': '🏔️', '都市': '🏙️', '科幻': '🚀', '历史': '📜' };
    return icons[category] || '📖';
}

function getStatusText(status) {
    const texts = { writing: '正在写', completed: '已完结', paused: '已暂停' };
    return texts[status] || '未知';
}

function getStatusColor(status) {
    const colors = { writing: 'bg-primary-500/10 text-primary-500', completed: 'bg-green-500/10 text-green-600', paused: 'bg-gray-500/10 text-gray-600' };
    return colors[status] || 'bg-gray-500/10 text-gray-600';
}

// ==================== Toast提示 ====================
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    
    const colors = {
        info: 'bg-gray-900/95 text-white',
        success: 'bg-green-600/95 text-white',
        warning: 'bg-yellow-600/95 text-white',
        error: 'bg-red-600/95 text-white',
    };
    
    toast.className = `${colors[type]} backdrop-blur-sm px-4 py-3 rounded-2xl text-sm font-medium text-center shadow-xl animate-toast-in`;
    toast.textContent = message;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 250);
    }, 2200);
}

// ==================== 模态框系统 ====================
function selectCover(coverId) {
    AppState.newBookCover = coverId;
    // 更新选中状态
    document.querySelectorAll('.cover-option').forEach(el => {
        if (el.dataset.cover === coverId) {
            el.classList.add('selected', 'animate-pulse-ring');
        } else {
            el.classList.remove('selected', 'animate-pulse-ring');
        }
    });
}

function openModal(type) {
    const container = document.getElementById('modalContainer');
    AppState.modalType = type;
    
    let content = '';
    
    if (type === 'newBook') {
        AppState.newBookCover = 'from-purple-500 to-blue-500'; // 重置默认
        content = `
            <div class="modal-overlay animate-fade-in" onclick="closeModal()">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold dark:text-white text-gray-800">📚 创建新书</h3>
                        <button onclick="closeModal()" class="w-8 h-8 rounded-full dark:bg-gray-700 bg-gray-100 flex items-center justify-center">✕</button>
                    </div>
                    <div class="space-y-5">
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300 text-gray-700 mb-2 block">书名</label>
                            <input type="text" id="newBookTitle" placeholder="输入书名" class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 border-gray-200 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300 text-gray-700 mb-2 block">选择封面</label>
                            <div class="grid grid-cols-4 gap-3">
                                ${COVER_TEMPLATES.map(cover => `
                                    <button onclick="selectCover('${cover.id}')" data-cover="${cover.id}" class="cover-option aspect-[3/4] rounded-xl bg-gradient-to-br ${cover.id} flex items-center justify-center text-white text-2xl shadow-md transition-all duration-200 ${cover.id === AppState.newBookCover ? 'selected animate-pulse-ring' : ''}">
                                        ${cover.icon}
                                    </button>
                                `).join('')}
                            </div>
                            <p class="text-xs text-center mt-2 dark:text-gray-400 text-gray-500">点击选择你喜欢的封面风格</p>
                        </div>
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300 text-gray-700 mb-2 block">分类</label>
                            <select id="newBookCategory" class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 border-gray-200 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <option value="玄幻">玄幻</option>
                                <option value="仙侠">仙侠</option>
                                <option value="都市">都市</option>
                                <option value="科幻">科幻</option>
                                <option value="历史">历史</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm font-medium dark:text-gray-300 text-gray-700 mb-2 block">一句话简介</label>
                            <textarea id="newBookDesc" rows="2" placeholder="简介..." class="w-full px-4 py-3 rounded-xl border dark:border-gray-600 border-gray-200 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary-500 resize-none"></textarea>
                        </div>
                        <button onclick="createNewBook()" class="w-full py-4 bg-gradient-to-r from-primary-500 to-ai-500 text-white rounded-xl font-bold shadow-lg shadow-primary-500/30 btn-press">
                            ✨ 创建作品

function closeModal() {

// ==================== 业务逻辑 ====================
function createNewBook() {
    const title = document.getElementById('newBookTitle')?.value.trim();
    const category = document.getElementById('newBookCategory')?.value;
    const description = document.getElementById('newBookDesc')?.value.trim();
    
    if (!title) {
        showToast('请输入书名', 'warning');
        return;
    }
    
    const newBook = {
        id: Date.now(),
        title,
        category: category || '玄幻',
        status: 'writing',
        cover: AppState.newBookCover,
        description: description || '暂无简介',
        createdAt: new Date().toISOString().split('T')[0],
        wordCount: 0,
        chapters: []
    };
    
    AppState.books.unshift(newBook);
    closeModal();
    showToast('✨ 作品创建成功！', 'success');
    
    // 跳转到书籍详情页
    AppState.currentBookId = newBook.id;
    if (AppState.currentPage === 'home') {
        switchTab('works');
    }
    setTimeout(() => pushPage('detail'), 300);
}

function createNewChapter() {
    const title = document.getElementById('newChapterTitle')?.value.trim();
    
    if (!title) {
        showToast('请输入章节标题', 'warning');
        return;
    }
    
    const book = AppState.books.find(b => b.id === AppState.currentBookId);
    if (!book) {
        showToast('未找到书籍', 'error');
        return;
    }
    
    const newChapter = {
        id: Date.now(),
        title,
        wordCount: 0,
        createdAt: new Date().toISOString().split('T')[0],
        content: ''
    };
    
    book.chapters.push(newChapter);
    closeModal();
    showToast('📝 章节创建成功！', 'success');
    
    // 跳转到编辑器
    AppState.currentChapterId = newChapter.id;
    AppState.editorContent = '';
    AppState.editorChapterTitle = title;
    pushPage('editor');
}

function editChapter(chapterId) {
    const book = AppState.books.find(b => b.id === AppState.currentBookId);
    const chapter = book?.chapters.find(c => c.id === chapterId);
    
    if (chapter) {
        AppState.currentChapterId = chapterId;
        AppState.editorContent = chapter.content;
        AppState.editorChapterTitle = chapter.title;
        pushPage('editor');
    }
}

function deleteChapter(chapterId) {
    const book = AppState.books.find(b => b.id === AppState.currentBookId);
    if (book) {
        if (confirm('确定要删除这个章节吗？')) {
            book.chapters = book.chapters.filter(c => c.id !== chapterId);
            renderPage();
            showToast('🗑️ 章节已删除', 'success');
        }
    }
}

function saveChapter() {
    const book = AppState.books.find(b => b.id === AppState.currentBookId);
    const chapter = book?.chapters.find(c => c.id === AppState.currentChapterId);
    
    if (chapter) {
        chapter.content = AppState.editorContent;
        chapter.wordCount = AppState.editorContent.replace(/\s/g, '').length;
        chapter.title = AppState.editorChapterTitle;
        
        // 更新书籍总字数
        book.wordCount = book.chapters.reduce((sum, c) => sum + c.wordCount, 0);
        
        showToast('💾 保存成功！', 'success');
    }
}

function editorAction(action) {
    const textarea = document.getElementById('editorTextarea');
    if (!textarea) return;
    
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const selectedText = textarea.value.substring(start, end);
    
    let replacement = '';
    switch(action) {
        case 'bold':
            replacement = `**${selectedText}**`;
            break;
        case 'italic':
            replacement = `*${selectedText}*`;
            break;
        case 'heading':
            replacement = `\n## ${selectedText || '标题'}\n`;
            break;
        case 'quote':
            replacement = `> ${selectedText || '引用内容'}`;
            break;
        case 'list':
            replacement = `- ${selectedText || '列表项'}`;
            break;
        case 'undo':
            showToast('↩️ 撤销功能开发中...');
            return;
    }
    
    textarea.value = textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
    AppState.editorContent = textarea.value;
    updateWordCount();
    showToast(`已应用${action === 'bold' ? '加粗' : action === 'italic' ? '斜体' : '格式'}`, 'info');
}

function aiAction(action) {
    const actions = {
        continue: '✍️ 智能续写中...',
        polish: '✨ 内容润色中...',
        expand: '🌿 内容扩写中...',
        brainstorm: '💡 灵感生成中...',
        custom: '🚀 执行自定义指令...'
    };
    
    showToast(actions[action] || '处理中...');
    setTimeout(() => {
        closeModal();
        showToast('🤖 AI功能开发中，敬请期待！', 'info');
    }, 1500);
}

// ==================== 页面切换系统 ====================
function renderPage(page = AppState.currentPage) {
    const container = document.getElementById('pageContainer');
    container.innerHTML = Pages[page] ? Pages[page]() : Pages.home();
    
    // 更新导航栏
    const titles = {
        home: '', works: '我的作品', community: '', ai: '', me: '',
        detail: '作品详情', report: 'AI质检报告', editor: '', postDetail: '',
    };
    document.getElementById('navTitle').textContent = titles[page] || '';
    
    // 控制返回按钮显示
    const showBack = !['home', 'works', 'community', 'ai', 'me'].includes(page);
    const navBack = document.getElementById('navBack');
    navBack.classList.toggle('hidden', !showBack);
    
    // 控制编辑器工具栏显示
    const editorToolbar = document.getElementById('editorToolbar');
    if (editorToolbar) {
        if (page === 'editor') {
            editorToolbar.classList.remove('hidden');
        } else {
            editorToolbar.classList.add('hidden');
        }
    }
    
    // 更新状态栏时间
    const timeEl = document.getElementById('statusTime');
    if (timeEl) {
        const now = new Date();
        timeEl.textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }
}

function switchTab(tab) {
    AppState.currentPage = tab;
    AppState.pageStack = [];
    
    // 更新Tab样式
    document.querySelectorAll('#tabBar button').forEach(btn => {
        const btnTab = btn.getAttribute('data-tab');
        if (btnTab === tab) {
            btn.classList.remove('text-gray-400');
            btn.classList.add('text-primary-500', 'scale-105');
        } else {
            btn.classList.add('text-gray-400');
            btn.classList.remove('text-primary-500', 'scale-105');
        }
    });
    
    renderPage();
}

function pushPage(page) {
    AppState.pageStack.push(AppState.currentPage);
    AppState.currentPage = page;
    renderPage();
}

function goBack() {
    if (AppState.pageStack.length > 0) {
        AppState.currentPage = AppState.pageStack.pop();
        renderPage();
    }
}

function toggleDarkMode() {
    AppState.darkMode = !AppState.darkMode;
    document.documentElement.classList.toggle('dark', AppState.darkMode);
    renderPage();
    showToast(AppState.darkMode ? '🌙 深色模式已开启' : '☀️ 浅色模式已开启');
}

function toggleGuardian() {
    AppState.guardianEnabled = !AppState.guardianEnabled;
    renderPage();
    showToast(AppState.guardianEnabled ? '🛡️ 人设守护已开启' : '人设守护已关闭');
}

function updateWordCount() {
    const textarea = document.getElementById('editorTextarea');
    const countEl = document.getElementById('wordCountDisplay');
    if (textarea && countEl) {
        AppState.editorContent = textarea.value;
        countEl.textContent = textarea.value.replace(/\s/g, '').length;
    }
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderPage();
});

// 初始渲染
renderPage();
</script>
