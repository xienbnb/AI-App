<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #6366F1; --color-primary-container: #EEF2FF; --color-on-primary: #ffffff;
      --color-background: #F8FAFC; --color-surface-container-lowest: #FAFAFA;
      --color-surface: #FFFFFF; --color-surface-container: #F1F5F9;
      --color-surface-container-high: #E2E8F0; --color-surface-container-highest: #CBD5E1;
      --color-on-surface: #1E293B; --color-on-surface-variant: #64748B;
      --color-success: #10B981; --color-error: #EF4444; --color-warning: #F59E0B;
      --color-outline: #CBD5E1; --color-outline-variant: #E2E8F0;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
      --radius-xl: 1rem; --radius-2xl: 1.5rem; --radius-full: 9999px;
      --shadow-card: 0 4px 12px rgba(99,102,241,0.08);
      --shadow-float: 0 10px 25px rgba(99,102,241,0.10);
      --shadow-dialog: 0 25px 50px rgba(99,102,241,0.15);
      --font-sans: system-ui, -apple-system, sans-serif;
    }
  </style>
  <style>
    body { min-height: max(812px, 100dvh); font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .slide-up { animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
    .chip-tag { transition: all 0.2s; cursor: pointer; }
    .chip-tag:hover { border-color: #6366F1; color: #6366F1; }
  </style>
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target; if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
<body class="bg-background text-on-surface font-sans">
  <header class="bg-background/95 backdrop-blur-sm sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-xl hover:bg-surface-container">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold">灵犀写作</h1>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-xl hover:bg-surface-container">
      <i data-lucide="bell" class="w-5 h-5"></i>
    </button>
  </header>

  <main class="px-4 pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- 步骤指示器 -->
    <div class="flex items-center justify-center gap-2 mb-6 pt-2">
      <div class="flex items-center gap-1.5">
        <div class="w-7 h-7 rounded-full bg-primary flex items-center justify-center"><span class="text-white text-xs font-bold">1</span></div>
        <span class="text-xs font-medium text-primary">灵感</span>
      </div>
      <div class="w-10 h-px bg-outline-variant"></div>
      <div class="flex items-center gap-1.5">
        <div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center"><span class="text-on-surface-variant text-xs font-medium">2</span></div>
        <span class="text-xs text-on-surface-variant">配置</span>
      </div>
      <div class="w-10 h-px bg-outline-variant"></div>
      <div class="flex items-center gap-1.5">
        <div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center"><span class="text-on-surface-variant text-xs font-medium">3</span></div>
        <span class="text-xs text-on-surface-variant">大纲</span>
      </div>
      <div class="w-10 h-px bg-outline-variant"></div>
      <div class="flex items-center gap-1.5">
        <div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center"><span class="text-on-surface-variant text-xs font-medium">4</span></div>
        <span class="text-xs text-on-surface-variant">成书</span>
      </div>
    </div>

    <!-- 品牌展示区 -->
    <div class="flex flex-col items-center pt-2 pb-6 slide-up">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-violet-500 flex items-center justify-center shadow-[0_8px_24px_rgba(99,102,241,0.2)] mb-4">
        <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
      </div>
      <h2 class="text-2xl font-bold text-on-surface mb-1">开始创作</h2>
      <p class="text-sm text-on-surface-variant">输入灵感，AI助你完成创作</p>
    </div>

    <!-- 灵感输入区 -->
    <div class="bg-surface rounded-2xl p-1 shadow-card mb-5">
      <textarea placeholder="输入你的小说灵感…&#10;例如：主角穿越到修真界获得签到系统" class="w-full min-h-[100px] bg-transparent text-sm text-on-surface placeholder:text-on-surface-variant/50 px-4 py-3 outline-none resize-none leading-relaxed" rows="4"></textarea>
      <div class="px-3 pb-3 flex items-center gap-2">
        <button class="text-xs text-on-surface-variant flex items-center gap-1 px-3 py-1.5 rounded-lg bg-primary-container text-primary-700"><i data-lucide="bot" class="w-3.5 h-3.5"></i>AI助力</button>
        <button class="text-xs text-on-surface-variant flex items-center gap-1 px-3 py-1.5 rounded-lg bg-surface-container"><i data-lucide="file-text" class="w-3.5 h-3.5"></i>导入</button>
      </div>
    </div>

    <!-- 快捷灵感标签 -->
    <div class="mb-6">
      <p class="text-xs text-on-surface-variant mb-3 flex items-center gap-1"><i data-lucide="lightbulb" class="w-3.5 h-3.5"></i>试试这些灵感</p>
      <div class="flex flex-wrap gap-2">
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="flame" class="w-3.5 h-3.5 text-orange-400"></i>修仙签到系统</span>
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="heart" class="w-3.5 h-3.5 text-rose-400"></i>都市甜宠文</span>
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="rocket" class="w-3.5 h-3.5 text-blue-400"></i>科幻星际文明</span>
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="search" class="w-3.5 h-3.5 text-purple-400"></i>悬疑推理</span>
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="swords" class="w-3.5 h-3.5 text-emerald-400"></i>系统爽文</span>
        <span class="chip-tag text-xs px-3 py-1.5 rounded-full bg-surface border border-outline-variant text-on-surface-variant inline-flex items-center gap-1.5"><i data-lucide="globe" class="w-3.5 h-3.5 text-amber-400"></i>历史穿越</span>
      </div>
    </div>

    <!-- 最近作品（快速进入） -->
    <div class="mb-6">
      <p class="text-xs text-on-surface-variant mb-3 flex items-center gap-1"><i data-lucide="history" class="w-3.5 h-3.5"></i>最近创作</p>
      <div class="flex gap-3 overflow-x-auto -mx-4 px-4 pb-1">
        <div class="flex-shrink-0 w-32 bg-surface rounded-2xl p-3 shadow-card">
          <div class="w-full h-20 rounded-xl bg-gradient-to-br from-primary/10 to-violet-500/10 flex items-center justify-center mb-2"><i data-lucide="book" class="w-6 h-6 text-primary"></i></div>
          <p class="text-xs font-medium truncate">签到修仙传</p>
          <p class="text-[10px] text-on-surface-variant">玄幻 · 3章</p>
        </div>
        <div class="flex-shrink-0 w-32 bg-surface rounded-2xl p-3 shadow-card">
          <div class="w-full h-20 rounded-xl bg-gradient-to-br from-rose-500/10 to-pink-500/10 flex items-center justify-center mb-2"><i data-lucide="book" class="w-6 h-6 text-rose-400"></i></div>
          <p class="text-xs font-medium truncate">星河之约</p>
          <p class="text-[10px] text-on-surface-variant">科幻 · 1章</p>
        </div>
        <div class="flex-shrink-0 w-32 bg-surface rounded-2xl p-3 shadow-card">
          <div class="w-full h-20 rounded-xl bg-gradient-to-br from-amber-500/10 to-orange-500/10 flex items-center justify-center mb-2"><i data-lucide="book" class="w-6 h-6 text-amber-400"></i></div>
          <p class="text-xs font-medium truncate">大明王侯</p>
          <p class="text-[10px] text-on-surface-variant">历史 · 5章</p>
        </div>
      </div>
    </div>

    <!-- 开始按钮 -->
    <button class="w-full h-12 rounded-2xl bg-gradient-to-r from-primary to-violet-500 text-white font-semibold text-sm shadow-[0_4px_16px_rgba(99,102,241,0.25)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
      开始创作
      <i data-lucide="arrow-right" class="w-4 h-4"></i>
    </button>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)] shadow-[0_-2px_12px_rgba(99,102,241,0.06)]">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary"><i data-lucide="pen-tool" class="w-5 h-5"></i><span class="text-[10px] font-bold tracking-wide">创作</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant"><i data-lucide="book-open" class="w-5 h-5"></i><span class="text-[10px] font-bold tracking-wide">作品</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[10px] font-bold tracking-wide">社区</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant"><i data-lucide="wand-sparkles" class="w-5 h-5"></i><span class="text-[10px] font-bold tracking-wide">AI工坊</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[10px] font-bold tracking-wide">我的</span></a>
  </nav>

  <script>lucide.createIcons();</script>
</body>
</html>
