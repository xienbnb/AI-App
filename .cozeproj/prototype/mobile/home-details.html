<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #6366F1; --color-primary-container: #EEF2FF; --color-on-primary: #ffffff;
      --color-purple: #8B5CF6; --color-purple-container: #F5F3FF;
      --color-background: #F8FAFC; --color-surface: #FFFFFF;
      --color-on-surface: #1E293B; --color-on-surface-variant: #64748B;
      --color-success: #10B981; --color-error: #EF4444; --color-warning: #F59E0B;
      --color-outline: #CBD5E1;
      --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-2xl: 1.5rem;
      --shadow-card: 0 2px 8px rgba(99,102,241,0.08);
      --font-sans: system-ui, -apple-system, sans-serif;
    }
  </style>
  <style>
    body { margin:0; background:#F8FAFC; font-family:system-ui,-apple-system,sans-serif; }
    .slide-up { animation: slideUp .4s ease forwards; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    ::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="bg-white px-5 pt-4 pb-3 border-b border-gray-100 flex items-center gap-3">
    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-500 cursor-pointer"></i>
    <div class="flex-1">
      <div class="text-lg font-bold text-gray-900">作品详情</div>
      <div class="text-xs text-gray-400">大纲已确认 · 完善作品信息</div>
    </div>
  </div>

  <div class="px-4 pb-28 overflow-y-auto" style="max-height:calc(100dvh - 130px);">

    <!-- Cover -->
    <div class="mt-4 slide-up">
      <div class="flex items-center justify-center">
        <div class="w-28 h-36 rounded-2xl bg-gradient-to-br from-primary/20 via-purple/20 to-indigo-100 relative overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-200">
          <div class="text-center">
            <i data-lucide="image-plus" class="w-6 h-6 text-gray-300 mx-auto"></i>
            <div class="text-xs text-gray-400 mt-1">上传封面</div>
          </div>
          <div class="absolute top-2 right-2 bg-white/80 text-[10px] text-primary px-1.5 py-0.5 rounded-full">AI生成</div>
        </div>
      </div>
      <div class="flex justify-center gap-2 mt-2">
        <span class="text-[10px] bg-primary-container text-primary px-2 py-0.5 rounded-full cursor-pointer">AI生成封面</span>
        <span class="text-[10px] bg-gray-50 text-gray-500 px-2 py-0.5 rounded-full cursor-pointer">从相册选择</span>
      </div>
    </div>

    <!-- Book Name -->
    <div class="mt-4 bg-white rounded-2xl p-5 shadow-card slide-up" style="animation-delay:.1s">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm font-bold text-gray-900">书名</div>
        <span class="text-[10px] bg-primary-container text-primary px-2 py-0.5 rounded-full cursor-pointer">AI换一个</span>
      </div>
      <div class="flex items-center gap-2">
        <input type="text" value="签到修仙：我靠系统躺着变强" class="flex-1 bg-gray-50 rounded-xl px-4 py-3 text-sm text-gray-900 border-0 outline-none" />
        <i data-lucide="edit-3" class="w-4 h-4 text-gray-300 cursor-pointer"></i>
      </div>
      <!-- AI suggestions -->
      <div class="flex gap-1.5 mt-2">
        <span class="text-[10px] bg-gray-50 text-gray-500 px-2 py-1 rounded-full">签到就变强</span>
        <span class="text-[10px] bg-gray-50 text-gray-500 px-2 py-1 rounded-full">我在修仙界签到</span>
        <span class="text-[10px] bg-gray-50 text-gray-500 px-2 py-1 rounded-full">签到成神</span>
      </div>
    </div>

    <!-- Author & Genre -->
    <div class="mt-3 bg-white rounded-2xl p-5 shadow-card slide-up" style="animation-delay:.15s">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <div class="text-xs text-gray-400 mb-1.5">作者署名</div>
          <input type="text" value="星辰大海" class="w-full bg-gray-50 rounded-xl px-3.5 py-2.5 text-sm text-gray-900 border-0 outline-none" />
        </div>
        <div>
          <div class="text-xs text-gray-400 mb-1.5">作品类型</div>
          <div class="bg-gray-50 rounded-xl px-3.5 py-2.5 text-sm text-gray-900">玄幻 · 签到 · 系统流</div>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="mt-3 bg-white rounded-2xl p-5 shadow-card slide-up" style="animation-delay:.2s">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm font-bold text-gray-900">作品简介</div>
        <div class="flex gap-1.5">
          <span class="text-[10px] bg-primary-container text-primary px-2 py-0.5 rounded-full cursor-pointer">AI生成</span>
          <span class="text-[10px] bg-rose-50 text-rose-500 px-2 py-0.5 rounded-full cursor-pointer">爆款优化</span>
        </div>
      </div>
      <textarea class="w-full bg-gray-50 rounded-xl p-3.5 text-xs text-gray-900 border-0 outline-none resize-none h-28">社畜林辰加班猝死后穿越到青云大陆，绑定了"签到系统"！只要在不同的地方签到，就能获得修为、功法、丹药……别人苦修百年，他签到即满级！当魔道天才陆沉携滔天凶威来袭时，林辰默默签到——恭喜宿主，获得"诸天万界最强功法"！这是一个社畜用签到系统在修仙界躺赢的故事，轻松爽快，脑洞大开！</textarea>
    </div>

    <!-- Chapter Summary Card -->
    <div class="mt-3 bg-white rounded-2xl p-5 shadow-card slide-up" style="animation-delay:.25s">
      <div class="flex items-center justify-between mb-2">
        <div class="text-sm font-bold text-gray-900">作品概览</div>
      </div>
      <div class="grid grid-cols-3 gap-3 text-center">
        <div class="bg-gray-50 rounded-xl py-3">
          <div class="text-lg font-bold text-primary">6</div>
          <div class="text-[10px] text-gray-400">分卷</div>
        </div>
        <div class="bg-gray-50 rounded-xl py-3">
          <div class="text-lg font-bold text-purple">30</div>
          <div class="text-[10px] text-gray-400">章节规划</div>
        </div>
        <div class="bg-gray-50 rounded-xl py-3">
          <div class="text-lg font-bold text-emerald-500">~30w</div>
          <div class="text-[10px] text-gray-400">预计字数</div>
        </div>
      </div>
    </div>

    <!-- Create Button -->
    <div class="mt-5 mb-6 slide-up" style="animation-delay:.3s">
      <button class="w-full bg-gradient-to-r from-primary to-purple text-white py-3.5 rounded-xl text-base font-bold flex items-center justify-center gap-2">
        <i data-lucide="wand-2" class="w-5 h-5"></i> 确认创建作品
      </button>
      <p class="text-center text-xs text-gray-400 mt-2">创建后将不可修改，可在编辑器中继续调整</p>
    </div>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
