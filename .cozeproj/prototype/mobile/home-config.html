<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme { --color-primary: #6366F1; --color-primary-container: #EEF2FF; --color-on-primary: #ffffff;
      --color-background: #F8FAFC; --color-surface-container-lowest: #FAFAFA;
      --color-surface: #FFFFFF; --color-surface-container: #F1F5F9;
      --color-surface-container-high: #E2E8F0; --color-surface-container-highest: #CBD5E1;
      --color-on-surface: #1E293B; --color-on-surface-variant: #64748B;
      --color-success: #10B981; --color-error: #EF4444; --color-warning: #F59E0B;
      --color-outline: #CBD5E1; --color-outline-variant: #E2E8F0;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
      --radius-xl: 1rem; --radius-2xl: 1.5rem; --radius-full: 9999px;
      --shadow-card: 0 4px 12px rgba(99,102,241,0.08);
      --shadow-float: 0 10px 25px rgba(99,102,241,0.10);
      --font-sans: system-ui, -apple-system, sans-serif; }
  </style>
  <style>
    body { min-height: max(812px, 100dvh); font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    .slide-up { animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .option-card { transition: all 0.2s; cursor: pointer; }
    .option-card:hover { border-color: #6366F1; background: #EEF2FF; }
    .option-card.selected { border-color: #6366F1; background: #EEF2FF; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }
  </style>
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target; if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他'; const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼'; const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
<body class="bg-background text-on-surface font-sans">
  <header class="bg-background/95 backdrop-blur-sm sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-xl hover:bg-surface-container"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
    <h1 class="text-base font-semibold">作品设定</h1>
    <div class="w-10 h-10"></div>
  </header>

  <main class="px-4 pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- 步骤指示器 (步骤2高亮) -->
    <div class="flex items-center justify-center gap-2 mb-5 pt-2">
      <div class="flex items-center gap-1.5"><div class="w-7 h-7 rounded-full bg-success/80 flex items-center justify-center"><i data-lucide="check" class="w-3.5 h-3.5 text-white"></i></div><span class="text-xs text-success">灵感</span></div>
      <div class="w-10 h-px bg-success/30"></div>
      <div class="flex items-center gap-1.5"><div class="w-7 h-7 rounded-full bg-primary flex items-center justify-center"><span class="text-white text-xs font-bold">2</span></div><span class="text-xs font-medium text-primary">配置</span></div>
      <div class="w-10 h-px bg-outline-variant"></div>
      <div class="flex items-center gap-1.5"><div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center"><span class="text-on-surface-variant text-xs font-medium">3</span></div><span class="text-xs text-on-surface-variant">大纲</span></div>
      <div class="w-10 h-px bg-outline-variant"></div>
      <div class="flex items-center gap-1.5"><div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center"><span class="text-on-surface-variant text-xs font-medium">4</span></div><span class="text-xs text-on-surface-variant">成书</span></div>
    </div>

    <div class="slide-up">
      <!-- 灵感回顾 -->
      <div class="bg-primary-container rounded-2xl p-3 mb-5">
        <div class="flex items-start gap-2.5">
          <i data-lucide="lightbulb" class="w-4 h-4 text-primary mt-0.5 flex-shrink-0"></i>
          <div>
            <p class="text-[11px] text-primary/70 font-medium mb-0.5">灵感</p>
            <p class="text-sm text-primary-900 leading-relaxed">主角穿越到修真界获得签到系统，每天签到变强</p>
          </div>
        </div>
      </div>

      <!-- Q1: 小说类型 -->
      <div class="mb-5">
        <div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="text-white text-[10px] font-bold">1</span></div><h3 class="text-sm font-semibold">选择小说类型</h3></div>
        <div class="grid grid-cols-2 gap-2.5">
          <div class="option-card selected p-3 rounded-2xl bg-surface border border-primary shadow-card"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="flame" class="w-4 h-4 text-orange-400"></i></span><span class="text-sm text-on-surface">玄幻奇幻</span></div></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="heart" class="w-4 h-4 text-rose-400"></i></span><span class="text-sm text-on-surface">都市言情</span></div></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="rocket" class="w-4 h-4 text-blue-400"></i></span><span class="text-sm text-on-surface">科幻未来</span></div></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="search" class="w-4 h-4 text-purple-400"></i></span><span class="text-sm text-on-surface">悬疑推理</span></div></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="globe" class="w-4 h-4 text-amber-400"></i></span><span class="text-sm text-on-surface">历史穿越</span></div></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><div class="flex items-center gap-2.5"><span class="text-lg"><i data-lucide="swords" class="w-4 h-4 text-emerald-400"></i></span><span class="text-sm text-on-surface">游戏竞技</span></div></div>
        </div>
      </div>

      <!-- Q2: 受众 -->
      <div class="mb-5">
        <div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="text-white text-[10px] font-bold">2</span></div><h3 class="text-sm font-semibold">目标受众</h3></div>
        <div class="flex gap-2.5">
          <div class="option-card selected flex-1 p-3 rounded-2xl bg-surface border border-primary text-center"><span class="text-sm font-medium text-primary">男频</span></div>
          <div class="option-card flex-1 p-3 rounded-2xl bg-surface border border-outline-variant text-center"><span class="text-sm text-on-surface">女频</span></div>
          <div class="option-card flex-1 p-3 rounded-2xl bg-surface border border-outline-variant text-center"><span class="text-sm text-on-surface">无差别</span></div>
        </div>
      </div>

      <!-- Q3: 平台 -->
      <div class="mb-5">
        <div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="text-white text-[10px] font-bold">3</span></div><h3 class="text-sm font-semibold">目标平台</h3></div>
        <div class="grid grid-cols-2 gap-2.5">
          <div class="option-card selected p-3 rounded-2xl bg-surface border border-primary"><span class="text-sm text-primary font-medium">起点中文网</span><p class="text-[10px] text-primary/60 mt-0.5">男频主力平台</p></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><span class="text-sm text-on-surface">番茄小说</span><p class="text-[10px] text-on-surface-variant mt-0.5">免费阅读平台</p></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><span class="text-sm text-on-surface">晋江文学城</span><p class="text-[10px] text-on-surface-variant mt-0.5">女频主力平台</p></div>
          <div class="option-card p-3 rounded-2xl bg-surface border border-outline-variant"><span class="text-sm text-on-surface">纵横中文网</span><p class="text-[10px] text-on-surface-variant mt-0.5">老牌网文平台</p></div>
        </div>
      </div>

      <!-- Q4: 篇幅 -->
      <div class="mb-6">
        <div class="flex items-center gap-2 mb-3"><div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center flex-shrink-0"><span class="text-white text-[10px] font-bold">4</span></div><h3 class="text-sm font-semibold">作品篇幅</h3></div>
        <div class="flex gap-2.5">
          <div class="option-card flex-1 p-3 rounded-2xl bg-surface border border-outline-variant text-center"><span class="text-sm text-on-surface">短篇</span><p class="text-[10px] text-on-surface-variant mt-0.5">3-10万字</p></div>
          <div class="option-card selected flex-1 p-3 rounded-2xl bg-surface border border-primary text-center"><span class="text-sm font-medium text-primary">中篇</span><p class="text-[10px] text-primary/60 mt-0.5">10-30万字</p></div>
          <div class="option-card flex-1 p-3 rounded-2xl bg-surface border border-outline-variant text-center"><span class="text-sm text-on-surface">长篇</span><p class="text-[10px] text-on-surface-variant mt-0.5">30万字以上</p></div>
        </div>
      </div>

      <!-- 确认按钮 -->
      <div class="flex gap-3">
        <button class="flex-1 h-12 rounded-2xl bg-surface border border-outline-variant text-on-surface font-medium text-sm">取消</button>
        <button class="flex-[2] h-12 rounded-2xl bg-gradient-to-r from-primary to-violet-500 text-white font-semibold text-sm shadow-[0_4px_16px_rgba(99,102,241,0.25)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
          确认，生成大纲
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
