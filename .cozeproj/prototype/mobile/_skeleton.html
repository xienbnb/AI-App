<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary: #6366F1;
      --color-primary-container: #EEF2FF;
      --color-on-primary: #ffffff;
      --color-background: #F8FAFC;
      --color-surface-container-lowest: #FAFAFA;
      --color-surface: #FFFFFF;
      --color-surface-container: #F1F5F9;
      --color-surface-container-high: #E2E8F0;
      --color-surface-container-highest: #CBD5E1;
      --color-on-surface: #1E293B;
      --color-on-surface-variant: #64748B;
      --color-success: #10B981;
      --color-error: #EF4444;
      --color-warning: #F59E0B;
      --color-outline: #CBD5E1;
      --color-outline-variant: #E2E8F0;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
      --radius-full: 9999px;
      --shadow-card: 0 4px 12px rgba(99,102,241,0.08);
      --shadow-float: 0 10px 25px rgba(99,102,241,0.10);
      --shadow-dialog: 0 25px 50px rgba(99,102,241,0.15);
      --font-sans: system-ui, -apple-system, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: max(812px, 100dvh);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .step-dot {
      transition: all 0.3s ease;
    }
    .step-dot.active {
      box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
    }
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-up {
      animation: slideUp 0.35s ease forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4 border-0">
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors">
      <i data-lucide="menu" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">灵犀写作</h1>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors">
      <i data-lucide="bell" class="w-5 h-5"></i>
    </button>
  </header>

  <main class="overflow-y-auto pb-[calc(3.5rem+env(safe-area-inset-bottom))]">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <!-- 底部 TabBar -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface border-0 flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)] shadow-[0_-2px_12px_rgba(99,102,241,0.06)]">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="pen-tool" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">创作</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="book-open" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">作品</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="users" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">社区</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="wand-sparkles" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">AI工坊</span>
    </a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">我的</span>
    </a>
  </nav>

  <script>lucide.createIcons();</script>
</body>

</html>
