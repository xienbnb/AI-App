<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - AI网文创作</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md mx-4">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-shield-halved text-2xl text-indigo-600"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">管理员登录</h1>
        <p class="text-gray-500 mt-1">AI 网文创作管理后台</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4"></div>

      <form id="loginForm">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">手机号</label>
          <input type="tel" id="phone" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="请输入管理员手机号" required>
        </div>

        <div class="mb-4">
          <div class="flex items-center justify-between mb-1">
            <label class="block text-sm font-medium text-gray-700">验证码</label>
            <a href="#" onclick="handleSendOtp()" id="sendOtpBtn" class="text-sm text-indigo-600 hover:text-indigo-800">获取验证码</a>
          </div>
          <input type="text" id="code" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="请输入验证码" required maxlength="6">
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700 font-medium transition">
          登 录
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="/" class="text-sm text-gray-400 hover:text-gray-600">
          <i class="fas fa-arrow-left mr-1"></i>返回前台
        </a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = location.origin + '/api/v1';
    let lastOtpCode = '';

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const code = document.getElementById('code').value;
      const errEl = document.getElementById('errorMsg');

      try {
        const res = await fetch(`${API_BASE}/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || '登录失败';
          errEl.classList.remove('hidden');
          return;
        }

        // 保存token并跳转
        localStorage.setItem('admin_token', data.token);
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        errEl.textContent = '网络错误，请重试';
        errEl.classList.remove('hidden');
      }
    };

    async function handleSendOtp() {
      const phone = document.getElementById('phone').value;
      const btn = document.getElementById('sendOtpBtn');
      const errEl = document.getElementById('errorMsg');

      if (!phone || phone.length < 11) {
        errEl.textContent = '请输入正确的手机号';
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/auth/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || '发送失败';
          errEl.classList.remove('hidden');
          return;
        }

        if (data.code) {
          lastOtpCode = data.code;
          alert(`[开发模式] 验证码: ${data.code}\n请在页面中输入此验证码`);
          document.getElementById('code').value = data.code;
        }

        // 倒计时
        let count = 60;
        btn.textContent = `${count}s后重试`;
        btn.style.pointerEvents = 'none';
        const timer = setInterval(() => {
          count--;
          if (count <= 0) {
            clearInterval(timer);
            btn.textContent = '重新获取';
            btn.style.pointerEvents = 'auto';
          } else {
            btn.textContent = `${count}s后重试`;
          }
        }, 1000);
      } catch (err) {
        errEl.textContent = '网络错误，请重试';
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
