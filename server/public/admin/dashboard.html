<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - AI网文创作</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-60 bg-white border-r border-gray-200 flex flex-col shrink-0">
      <div class="p-5 border-b border-gray-100">
        <h1 class="font-bold text-lg text-gray-900">
          <i class="fas fa-feather text-indigo-600 mr-2"></i>管理后台
        </h1>
        <p class="text-xs text-gray-400 mt-0.5">AI 网文创作</p>
      </div>
      <nav class="flex-1 p-3 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm nav-link" data-page="dashboard">
          <i class="fas fa-chart-pie w-5 text-center"></i>仪表盘
        </a>
        <a href="users.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm nav-link" data-page="users">
          <i class="fas fa-users w-5 text-center"></i>用户管理
        </a>
        <a href="redeem.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm nav-link" data-page="redeem">
          <i class="fas fa-ticket w-5 text-center"></i>兑换码
        </a>
        <a href="posts.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm nav-link" data-page="posts">
          <i class="fas fa-newspaper w-5 text-center"></i>内容审核
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm nav-link" data-page="settings">
          <i class="fas fa-gear w-5 text-center"></i>系统设置
        </a>
      </nav>
      <div class="p-3 border-t border-gray-100">
        <button onclick="handleLogout()" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-gray-50 w-full">
          <i class="fas fa-right-from-bracket w-5 text-center"></i>退出登录
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-auto">
      <div class="p-6 max-w-7xl mx-auto">
        <!-- Top bar -->
        <div class="flex items-center justify-between mb-6">
          <div>
            <h2 class="text-2xl font-bold text-gray-900" id="pageTitle">仪表盘</h2>
            <p class="text-sm text-gray-500 mt-1" id="pageSubtitle">系统数据概览</p>
          </div>
          <div class="flex items-center gap-3 text-sm text-gray-500">
            <i class="fas fa-circle text-green-500 text-[8px]"></i>
            <span>服务正常运行</span>
          </div>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm text-gray-500">总用户数</span>
              <span class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-users text-blue-500 text-sm"></i>
              </span>
            </div>
            <div class="text-3xl font-bold text-gray-900" id="statTotalUsers">-</div>
            <div class="text-xs text-gray-400 mt-2">今日新增 <span id="statTodayNew">-</span></div>
          </div>
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm text-gray-500">AI调用量</span>
              <span class="w-8 h-8 bg-purple-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-robot text-purple-500 text-sm"></i>
              </span>
            </div>
            <div class="text-3xl font-bold text-gray-900" id="statTotalCalls">-</div>
            <div class="text-xs text-gray-400 mt-2">今日 <span id="statTodayCalls">-</span> 次</div>
          </div>
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm text-gray-500">VIP用户</span>
              <span class="w-8 h-8 bg-amber-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-crown text-amber-500 text-sm"></i>
              </span>
            </div>
            <div class="text-3xl font-bold text-gray-900" id="statVipUsers">-</div>
            <div class="text-xs text-gray-400 mt-2">付费用户</div>
          </div>
          <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm text-gray-500">系统状态</span>
              <span class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-heart-pulse text-green-500 text-sm"></i>
              </span>
            </div>
            <div class="text-3xl font-bold text-green-500">正常</div>
            <div class="text-xs text-gray-400 mt-2">API 服务运行中</div>
          </div>
        </div>

        <!-- Quick actions -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
          <h3 class="font-semibold text-gray-900 mb-4">快捷操作</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <a href="users.html" class="flex items-center gap-4 p-4 rounded-lg bg-gray-50 hover:bg-gray-100 transition">
              <span class="w-10 h-10 bg-indigo-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-user-plus text-indigo-500"></i>
              </span>
              <div>
                <div class="font-medium text-gray-900 text-sm">用户管理</div>
                <div class="text-xs text-gray-400">查看和管理所有用户</div>
              </div>
            </a>
            <a href="redeem.html" class="flex items-center gap-4 p-4 rounded-lg bg-gray-50 hover:bg-gray-100 transition">
              <span class="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-gift text-amber-500"></i>
              </span>
              <div>
                <div class="font-medium text-gray-900 text-sm">生成兑换码</div>
                <div class="text-xs text-gray-400">创建字数/次数兑换码</div>
              </div>
            </a>
            <a href="posts.html" class="flex items-center gap-4 p-4 rounded-lg bg-gray-50 hover:bg-gray-100 transition">
              <span class="w-10 h-10 bg-rose-50 rounded-lg flex items-center justify-center">
                <i class="fas fa-flag text-rose-500"></i>
              </span>
              <div>
                <div class="font-medium text-gray-900 text-sm">内容审核</div>
                <div class="text-xs text-gray-400">管理社区帖子</div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = location.origin + '/api/v1';

    function getToken() {
      const token = localStorage.getItem('admin_token');
      if (!token) window.location.href = '/admin/';
      return token;
    }

    async function fetchWithAuth(url) {
      const res = await fetch(url, {
        headers: { 'x-session': getToken() }
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('admin_token');
        window.location.href = '/admin/';
        return null;
      }
      return res.json();
    }

    async function loadDashboard() {
      const data = await fetchWithAuth(`${API_BASE}/admin/dashboard`);
      if (!data) return;
      document.getElementById('statTotalUsers').textContent = data.totalUsers || 0;
      document.getElementById('statTodayNew').textContent = data.todayNewUsers || 0;
      document.getElementById('statTotalCalls').textContent = data.totalCalls || 0;
      document.getElementById('statTodayCalls').textContent = data.todayCalls || 0;
      document.getElementById('statVipUsers').textContent = data.vipUsers || 0;
    }

    function handleLogout() {
      localStorage.removeItem('admin_token');
      window.location.href = '/admin/';
    }

    // Highlight current nav
    document.querySelectorAll('.nav-link').forEach(a => {
      if (a.href.endsWith(window.location.pathname)) {
        a.classList.add('bg-indigo-50', 'text-indigo-600');
      }
    });

    loadDashboard();
  </script>
</body>
</html>
